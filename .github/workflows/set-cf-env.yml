name: Set Cloudflare Pages Environment Variable
on:
  workflow_dispatch:

jobs:
  set-env:
    runs-on: ubuntu-latest
    steps:
      - name: Set REDALERT_API_KEY on Cloudflare Pages
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/geebee-forge" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "env_vars": {
                    "REDALERT_API_KEY": { "type": "secret_text", "value": "${{ secrets.REDALERT_API_KEY }}" }
                  }
                },
                "preview": {
                  "env_vars": {
                    "REDALERT_API_KEY": { "type": "secret_text", "value": "${{ secrets.REDALERT_API_KEY }}" }
                  }
                }
              }
            }' | jq '.success'
