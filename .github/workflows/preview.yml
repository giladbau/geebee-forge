name: Preview Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run build

      # Patch generated wrangler.json for preview:
      # - Rename worker to geebee-forge-pr-<number>
      # - Strip KV bindings (SESSION has no ID, would fail)
      # - Strip non-inherit bindings that require account-level config
      - name: Patch wrangler.json for preview
        run: |
          jq '
            .name = "geebee-forge-pr-${{ github.event.number }}" |
            del(.kv_namespaces) |
            del(.images)
          ' dist/server/wrangler.json > dist/server/wrangler-preview.json
          echo "--- patched wrangler-preview.json ---"
          cat dist/server/wrangler-preview.json

      - name: Deploy preview worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler-preview.json

      - name: Set preview worker secrets
        run: |
          jq -n --arg key "$REDALERT_API_KEY" '{"REDALERT_API_KEY": $key}' \
            | npx wrangler secret bulk --config dist/server/wrangler-preview.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          REDALERT_API_KEY: ${{ secrets.REDALERT_API_KEY }}

      - name: Extract preview URL from deploy output
        id: preview-url
        run: |
          # Parse the actual URL from wrangler deploy output
          PREVIEW_URL=$(echo "${{ steps.deploy.outputs.command-output }}" | grep -oP 'https://[^\s]+\.workers\.dev' | head -1)
          if [ -z "$PREVIEW_URL" ]; then
            # Fallback: construct from known account subdomain
            PREVIEW_URL="https://geebee-forge-pr-${{ github.event.number }}.gilad-bau.workers.dev"
          fi
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-url -->';
            const workerName = `geebee-forge-pr-${{ github.event.number }}`;
            const previewUrl = `${{ steps.preview-url.outputs.url }}`;
            const body = [
              marker,
              `### 🔍 Preview Deploy`,
              ``,
              `Preview: ${previewUrl}`,
              `Worker: \`${workerName}\``,
              `Commit: \`${context.sha.slice(0, 7)}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.number }},
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.number }},
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Delete preview worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: delete --name geebee-forge-pr-${{ github.event.number }} --force
